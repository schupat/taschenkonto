services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taschenkonto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taschenkonto}
      POSTGRES_DB: taschenkonto
    # Uncomment for local dev access:
    # ports:
    #   - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taschenkonto"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://taschenkonto:${POSTGRES_PASSWORD:-taschenkonto}@db:5432/taschenkonto"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY:-}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-}
      KIOSK_SESSION_SECRET: ${KIOSK_SESSION_SECRET}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  cron:
    build: ./docker/cron
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taschenkonto}
      TZ: Europe/Berlin
    volumes:
      - ./data/backups:/backups
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
